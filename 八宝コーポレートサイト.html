<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Bundled Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1c160f; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    #__bundler_loading { position: fixed; bottom: 20px; right: 20px; font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif; color: #666; background: #fff; padding: 8px 14px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.12); z-index: 10000; }
    #__bundler_thumbnail { position: fixed; inset: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #1c160f; z-index: 9999; }
    #__bundler_thumbnail svg { width: 100%; height: 100%; object-fit: contain; }
    #__bundler_placeholder { color: #999; font-size: 14px; }
  
  /* text-wrap-balance-injected */

  /* ===== Text-wrap balancing (orphan-1-4-char fix) ===== */
  h1, h2, h3, .closeTitle, .panelTitle, .hero h1, .hero .sub, .pageTitle h1, .intro h2 {
    text-wrap: balance;
  }
  p, li, dd, .lead, .body p, .closer, .voice-quote, .work .lead, .videoBlock .lead {
    text-wrap: pretty;
  }
</style>
  <script>
    (function () {
      var __linkMap = {
        '#omoi':    '八宝の想い.html',
        '#brands':  '事業内容.html',
        '#recruit': '採用情報.html',
        '#company': '会社概要.html',
        '#contact': '会社概要.html#contact'
      };
      function rewriteOmoiLinks() {
        var currentPath = decodeURIComponent(location.pathname);
        for (var from in __linkMap) {
          var to = __linkMap[from];
          var anchors = document.querySelectorAll('a[href="' + from + '"]');
          for (var i = 0; i < anchors.length; i++) {
            anchors[i].setAttribute('href', to);
            anchors[i].dataset.omoiRewritten = '1';
            if (to === currentPath || to === currentPath + location.hash) {
              anchors[i].setAttribute('aria-current', 'page');
            }
          }
        }
        // PHILOSOPHY section の「企業理念を見る」CTA を「会社概要を見る」に置換 → /会社概要.html
        var allAnchors = document.querySelectorAll('a');
        for (var j = 0; j < allAnchors.length; j++) {
          var a = allAnchors[j];
          var t = (a.textContent || '').replace(/\s+/g, '');
          if (t.indexOf('企業理念を見る') !== -1 || (a.dataset.philosophyRewritten === '1' && t.indexOf('会社概要を見る') === -1)) {
            a.setAttribute('href', '会社概要.html');
            a.dataset.philosophyRewritten = '1';
            // テキストノードを「企業理念を見る」→「会社概要を見る」に置換 (矢印 span は温存)
            var walker = document.createTreeWalker(a, NodeFilter.SHOW_TEXT, null);
            var node;
            while ((node = walker.nextNode())) {
              if (node.nodeValue && node.nodeValue.indexOf('企業理念を見る') !== -1) {
                node.nodeValue = node.nodeValue.replace('企業理念を見る', '会社概要を見る');
              }
            }
          }
        }
      }
      function injectHeroSlides() {
        var hero = document.getElementById('hero');
        if (!hero || hero.dataset.heroInjected === '1') return;
        // Wait until hero has the expected children rendered
        if (hero.children.length < 3) return;
        hero.dataset.heroInjected = '1';

        var srcs = [
          'photos/hero/1-cha-large.webp',
          'photos/hero/2-sake-large.webp',
          'photos/hero/3-noodle-large.webp',
          'photos/hero/4-kama-large.webp'
        ];
        var smallSrcs = [
          'photos/hero/1-cha-small.webp',
          'photos/hero/2-sake-small.webp',
          'photos/hero/3-noodle-small.webp',
          'photos/hero/4-kama-small.webp'
        ];
        var useSmall = window.matchMedia('(max-width: 880px)').matches;
        var pool = useSmall ? smallSrcs : srcs;

        var container = document.createElement('div');
        container.id = '__hero_slides';
        container.setAttribute('aria-hidden', 'true');
        container.style.cssText = 'position:absolute;inset:0;z-index:0;pointer-events:none;';

        pool.forEach(function (src, i) {
          var d = document.createElement('div');
          d.className = '__hero-slide';
          // クロスフェード: 2 秒 + cubic-bezier で滑らかな blending。
          // 新スライドは fade-in が ease-out (早く出てくる)、古スライドは fade-out が ease-in (後半でゆっくり消える) — これで両者が中央付近で重なる
          d.style.cssText = 'position:absolute;inset:0;background-image:url("' + src + '");background-position:center;background-size:cover;background-repeat:no-repeat;opacity:' + (i === 0 ? '1' : '0') + ';transition:opacity 2s cubic-bezier(0.4, 0, 0.2, 1);will-change:opacity,transform;transform:scale(1);transform-origin:center center;';
          container.appendChild(d);
        });

        // Ken Burns 効果のためのキーフレーム (まだなければ注入)
        if (!document.getElementById('__hero_zoom_kf')) {
          var kf = document.createElement('style');
          kf.id = '__hero_zoom_kf';
          kf.textContent = '@keyframes __heroSlowZoom { from { transform: scale(1); } to { transform: scale(1.12); } }';
          document.head.appendChild(kf);
        }

        function startZoom(el) {
          // 既存アニメーションをリセットしてから付け直すと、毎回 scale(1) から再開
          el.style.animation = 'none';
          // force reflow
          el.offsetHeight;
          el.style.animation = '__heroSlowZoom 10s ease-out forwards';
        }
        // 初回 (1 枚目) は即ズーム開始
        startZoom(container.children[0]);

        // まず最初は最後尾に追加 (バンドルがまだ children を追加し続ける可能性があるため)
        hero.appendChild(container);
        // バンドル描画が落ち着いた後に、vignette の手前に再配置する関数
        function repositionSlides() {
          var insertBefore = null;
          for (var n = 0; n < hero.children.length; n++) {
            var child = hero.children[n];
            if (child === container) continue;
            var st = child.getAttribute('style') || '';
            if (st.indexOf('linear-gradient(rgba(20, 15') !== -1 ||
                st.indexOf('linear-gradient(90deg, rgba(20, 15') !== -1) {
              insertBefore = child;
              break;
            }
          }
          if (insertBefore && container.nextSibling !== insertBefore) {
            hero.insertBefore(container, insertBefore);
          }
        }
        // 数回試行 (バンドル後追加に対応)
        repositionSlides();
        setTimeout(repositionSlides, 200);
        setTimeout(repositionSlides, 600);
        setTimeout(repositionSlides, 1500);

        // ===== Progress bar (4 segments, クリック可能) =====
        var progress = document.createElement('div');
        progress.id = '__hero_progress';
        progress.setAttribute('role', 'tablist');
        progress.setAttribute('aria-label', 'ヒーロー写真の選択');
        progress.style.cssText = 'position:absolute;left:24px;bottom:24px;display:flex;gap:10px;z-index:5;';
        var brandLabels = ['茶葉', '地酒', '自家製麺', '釜めし'];
        for (var s = 0; s < pool.length; s++) {
          var seg = document.createElement('button');
          seg.type = 'button';
          seg.className = '__hero-progress-seg';
          seg.dataset.slideIdx = s;
          seg.setAttribute('role', 'tab');
          seg.setAttribute('aria-label', (s + 1) + '枚目: ' + brandLabels[s]);
          seg.style.cssText = 'width:72px;height:14px;padding:6px 0;background:transparent;border:0;cursor:pointer;display:flex;align-items:center;justify-content:stretch;';
          var track = document.createElement('span');
          track.style.cssText = 'flex:1;height:2px;background:rgba(246,241,231,0.3);overflow:hidden;position:relative;display:block;transition:background .25s;';
          var fill = document.createElement('span');
          fill.className = '__hero-progress-fill';
          fill.style.cssText = 'position:absolute;inset:0;background:rgba(246,241,231,0.95);transform:scaleX(0);transform-origin:left center;display:block;';
          track.appendChild(fill);
          seg.appendChild(track);
          progress.appendChild(seg);
        }
        hero.appendChild(progress);

        // Progress keyframes (8 秒で 0 → 1)
        if (!document.getElementById('__hero_progress_kf')) {
          var pkf = document.createElement('style');
          pkf.id = '__hero_progress_kf';
          pkf.textContent = '@keyframes __heroProgFill { from { transform: scaleX(0); } to { transform: scaleX(1); } }';
          document.head.appendChild(pkf);
        }
        function updateProgress(idx) {
          var fills = progress.querySelectorAll('.__hero-progress-fill');
          for (var i = 0; i < fills.length; i++) {
            // Reset all
            fills[i].style.animation = 'none';
            if (i < idx) {
              fills[i].style.transform = 'scaleX(1)'; // past
            } else if (i === idx) {
              fills[i].style.transform = 'scaleX(0)';
              // Force reflow then start animation
              fills[i].offsetHeight;
              fills[i].style.animation = '__heroProgFill 8s linear forwards';
            } else {
              fills[i].style.transform = 'scaleX(0)'; // future
            }
          }
        }
        // Initialize: slide 0 active
        updateProgress(0);
        // expose to outer scope so cycle can call it
        container.__updateProgress = updateProgress;

        // Preload remaining images sequentially after the first paints
        setTimeout(function () {
          for (var k = 1; k < pool.length; k++) {
            (new Image()).src = pool[k];
          }
        }, 100);

        // Skip cycling if user prefers reduced motion
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        if (hero.dataset.heroCycling === '1') return;
        hero.dataset.heroCycling = '1';

        var current = 0;
        var slideEls = container.children;
        var cycleTimer = null;

        function goToSlide(idx) {
          if (idx === current) return;
          slideEls[current].style.opacity = '0';
          current = ((idx % slideEls.length) + slideEls.length) % slideEls.length;
          slideEls[current].style.opacity = '1';
          startZoom(slideEls[current]);
          if (container.__updateProgress) container.__updateProgress(current);
        }
        function startCycle() {
          if (cycleTimer) clearInterval(cycleTimer);
          cycleTimer = setInterval(function () {
            if (document.hidden) return;
            goToSlide((current + 1) % slideEls.length);
          }, 8000);
        }
        startCycle();

        // Click handlers on progress segments
        var segs = progress.querySelectorAll('.__hero-progress-seg');
        for (var s2 = 0; s2 < segs.length; s2++) {
          segs[s2].addEventListener('click', function (e) {
            var idx = parseInt(e.currentTarget.dataset.slideIdx, 10);
            if (isNaN(idx)) return;
            goToSlide(idx);
            startCycle(); // クリック後に 8 秒タイマー再スタート
          });
          // Hover で track 明るく
          segs[s2].addEventListener('mouseenter', function (e) {
            var track = e.currentTarget.firstElementChild;
            if (track) track.style.background = 'rgba(246,241,231,0.55)';
          });
          segs[s2].addEventListener('mouseleave', function (e) {
            var track = e.currentTarget.firstElementChild;
            if (track) track.style.background = 'rgba(246,241,231,0.3)';
          });
        }
      }
      function tagBrandCards() {
        // バンドルの brand cards は class="scp2" で 4 つとも区別がつかないので
        // テキストで識別して data-brand 属性を付与し、CSS から個別に背景画像をあてる
        var brandMap = {
          'GRANCHA 大和茶': 'grancha',
          'うまっしゅ 奈良の地酒': 'umasshu',
          'むぎの蔵 うどん': 'muginokura',
          '釜めしGRANCHA': 'kamameshi'
        };
        var brandsRoot = document.getElementById('brands');
        if (!brandsRoot) return;
        var links = brandsRoot.querySelectorAll('a');
        for (var i = 0; i < links.length; i++) {
          var t = (links[i].textContent || '').replace(/\s+/g, ' ');
          for (var key in brandMap) {
            if (t.indexOf(key) !== -1) {
              links[i].setAttribute('data-brand', brandMap[key]);
              break;
            }
          }
        }
      }
      function mergeContactTab() {
        // 1) href === /会社概要.html の nav-style リンクのテキストを 会社概要・お問い合わせ に
        // 2) href === /会社概要.html#contact の nav-style リンクを非表示 (pill ボタンは除外)
        // pill 判定: CTA としての 「見る」「こちら」「→」 を含む or 大きな padding を持つ
        function isCta(a) {
          var t = (a.textContent || '').trim();
          if (/見る|こちら|戻る/.test(t)) return true;
          var st = a.getAttribute('style') || '';
          // 強い背景色 + 大きい padding を持つ button-pill
          var hasBg = /background[^:]*:\s*(?:rgb|#[0-9a-f]|var\(--)/i.test(st);
          var hasPad = /padding:\s*(?:\d+)px\s+(?:\d+)px/i.test(st);
          if (hasBg && hasPad) return true;
          return false;
        }
        function replaceTextNode(node, find, replace) {
          if (node.nodeType === 3) {
            if (node.textContent.trim() === find) {
              node.textContent = node.textContent.replace(find, replace);
              return true;
            }
            return false;
          }
          var found = false;
          for (var i = 0; i < node.childNodes.length; i++) {
            if (replaceTextNode(node.childNodes[i], find, replace)) found = true;
          }
          return found;
        }
        // 会社概要 リンクの text 書き換え
        var infoLinks = document.querySelectorAll('a[href="会社概要.html"]');
        for (var i = 0; i < infoLinks.length; i++) {
          var a = infoLinks[i];
          if (a.dataset.contactMerged === '1') continue;
          if (isCta(a)) continue; // CTA はそのまま
          if (replaceTextNode(a, '会社概要', '会社概要・お問い合わせ')) {
            a.dataset.contactMerged = '1';
          }
        }
        // お問い合わせ リンク (nav-style のみ) を非表示
        var contactLinks = document.querySelectorAll('a[href="会社概要.html#contact"]');
        for (var j = 0; j < contactLinks.length; j++) {
          var cl = contactLinks[j];
          if (cl.dataset.contactHidden === '1') continue;
          if (isCta(cl)) continue; // CTA / pill ボタンはそのまま
          cl.style.display = 'none';
          cl.dataset.contactHidden = '1';
        }
      }
      function hideArrowSpans() {
        // 「→」だけの span/div を非表示 (buttons / a タグ内に存在するもの)
        var nodes = document.querySelectorAll('a span, a div, button span, button div');
        for (var i = 0; i < nodes.length; i++) {
          var n = nodes[i];
          var t = (n.textContent || '').trim();
          if (t === '→' && n.children.length === 0) {
            n.style.display = 'none';
          }
        }
      }
      function injectA11y() {
        // lang=ja (bundle wipes html attributes)
        if (document.documentElement.getAttribute('lang') !== 'ja') {
          document.documentElement.setAttribute('lang', 'ja');
        }
        // Hamburger / icon-only buttons aria-label
        var menuBtns = document.querySelectorAll('button:not([aria-label])');
        for (var i = 0; i < menuBtns.length; i++) {
          var b = menuBtns[i];
          if (b.getAttribute('aria-label')) continue;
          var txt = (b.textContent || '').trim();
          // Treat single-char (×, ✕, ☰), empty, or pure-icon (svg/img/span-only) buttons
          var isIconOnly = txt.length <= 2 || b.querySelector('svg, img');
          if (isIconOnly) {
            var isClose = txt === '×' || txt === '✕' || /close/i.test(b.className || '');
            b.setAttribute('aria-label', isClose ? '閉じる' : 'メニューを開く');
          }
        }
        // Empty / icon-only anchors (often used for placeholder social icons)
        var anchors = document.querySelectorAll('a:not([aria-label])');
        for (var j = 0; j < anchors.length; j++) {
          var a = anchors[j];
          var aText = (a.textContent || '').trim();
          if (aText.length === 0 && !a.querySelector('img')) {
            a.setAttribute('aria-label', a.getAttribute('href') === '#' ? 'リンク (準備中)' : 'リンク');
          }
        }
        // Skip link
        if (!document.getElementById('__skip_link')) {
          var skip = document.createElement('a');
          skip.id = '__skip_link';
          skip.href = '#hero';
          skip.textContent = 'メインコンテンツへスキップ';
          skip.style.cssText = 'position:fixed;left:8px;top:-100px;z-index:99999;background:#1c160f;color:#f6f1e7;padding:12px 20px;font-size:14px;border-radius:4px;text-decoration:none;transition:top .15s;';
          skip.addEventListener('focus', function () { this.style.top = '8px'; });
          skip.addEventListener('blur', function () { this.style.top = '-100px'; });
          document.body.insertBefore(skip, document.body.firstChild);
        }
      }
      function hideRecruitIcons() {
        // RECRUIT セクションの 4 アイコン行 (人を大切にする職場 / 成長できる環境 / 地域に貢献する誇り / 安心の福利厚生) を非表示
        var leaf = null;
        var all = document.querySelectorAll('div, p, span');
        for (var i = 0; i < all.length; i++) {
          if (all[i].children.length === 0 && (all[i].textContent||'').trim() === '人を大切にする職場') { leaf = all[i]; break; }
        }
        if (!leaf) return;
        // Walk up to find ancestor that contains all 4 labels
        var p = leaf;
        for (var k = 0; k < 8 && p; k++) {
          var t = p.textContent || '';
          if (t.indexOf('人を大切にする職場') !== -1 && t.indexOf('成長できる環境') !== -1 &&
              t.indexOf('地域に貢献する誇り') !== -1 && t.indexOf('安心の福利厚生') !== -1) {
            // Make sure we have the row container, not the whole section
            if (t.length < 400) { p.style.display = 'none'; return; }
          }
          p = p.parentElement;
        }
      }
      function hideFooterFollow() {
        // フッターの FOLLOW + Instagram ロゴブロックを非表示
        var leaf = null;
        var all = document.querySelectorAll('div, p, span');
        for (var i = 0; i < all.length; i++) {
          if (all[i].children.length === 0 && (all[i].textContent||'').trim() === 'FOLLOW') { leaf = all[i]; break; }
        }
        if (!leaf) return;
        // Walk up to find a wrapper containing FOLLOW + IG link
        var p = leaf.parentElement;
        if (p) p.style.display = 'none';
      }
      function fixFooterContact() {
        // バンドルのフッター placeholder (郵便番号/住所/TEL) を実値に置換
        if (document.body.dataset.footerContactFixed === '1') return;
        var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null);
        var node, fixed = false;
        while ((node = walker.nextNode())) {
          var v = node.nodeValue;
          if (!v) continue;
          var nv = v;
          if (nv.indexOf('630-0000') !== -1) nv = nv.replace('630-0000', '630-8215');
          // 「○」(U+25CB) と「〇」(U+3007) 両方の placeholder を捕捉
          if (nv.indexOf('奈良県奈良市○○町0-0-0') !== -1) nv = nv.replace('奈良県奈良市○○町0-0-0', '奈良県奈良市東向中町１１ 丸八ビル ２階');
          if (nv.indexOf('奈良県奈良市〇〇町0-0-0') !== -1) nv = nv.replace('奈良県奈良市〇〇町0-0-0', '奈良県奈良市東向中町１１ 丸八ビル ２階');
          if (nv.indexOf('0742-00-0000') !== -1) nv = nv.replace('0742-00-0000', '0742-24-1755');
          if (nv !== v) { node.nodeValue = nv; fixed = true; }
        }
        if (fixed) document.body.dataset.footerContactFixed = '1';
      }
      function hidePhilosophyPhotoCaption() {
        // PHILOSOPHY セクション底部の "PHOTO ／ 奈良の夕景・五重塔" キャプションを非表示
        var all = document.querySelectorAll('span, div, p');
        for (var i = 0; i < all.length; i++) {
          var el = all[i];
          if (el.children.length === 0 && (el.textContent || '').indexOf('奈良の夕景・五重塔') !== -1) {
            el.style.display = 'none';
            break;
          }
        }
      }
      function fixPhilosophyTitle() {
        // PHILOSOPHY h2 を「奈良の食文化を大切に」+「人と人とを笑顔でつなぐ」の 2 行に強制 (句読点なし)
        var h2 = null;
        var heads = document.querySelectorAll('h1, h2');
        for (var i = 0; i < heads.length; i++) {
          var t = (heads[i].textContent || '').replace(/\s+/g, '');
          if (t.indexOf('奈良の食文化') !== -1 && t.indexOf('人と人とを') !== -1) { h2 = heads[i]; break; }
        }
        if (!h2 || h2.dataset.philosophyTitleFixed === '2') return;
        h2.dataset.philosophyTitleFixed = '2';
        // 2 つの span に分割 (display:block で必ず別行)
        h2.innerHTML = '<span style="display:block">奈良の食文化を大切に</span>' +
                       '<span style="display:block">人と人とを笑顔でつなぐ</span>';
        // font-size を再設定 (PC: 46px / モバイル: 20px) — 各行が必ず収まるよう tight clamp
        h2.style.fontSize = 'clamp(20px, 5vw, 46px)';
        h2.style.lineHeight = '1.55';
        h2.style.letterSpacing = '0.1em';
        // 親 max-width を拡張 (720 → 900) で desktop の自動 wrap 防止
        var parent = h2.parentElement;
        if (parent) parent.style.maxWidth = '900px';
      }
      function injectPhilosophyDecor() {
        // PHILOSOPHY セクションをテキストマッチで特定 (data-dc-tpl 番号は再描画で変わる)
        var sec = null;
        var candidates = document.querySelectorAll('section');
        for (var i = 0; i < candidates.length; i++) {
          var s = candidates[i];
          var t = s.textContent || '';
          if (t.indexOf('PHILOSOPHY') !== -1 && t.indexOf('奈良の食文化') !== -1 && t.length < 600) {
            sec = s; break;
          }
        }
        if (!sec || sec.dataset.philosophyDecorated === '1') return;
        sec.dataset.philosophyDecorated = '1';
        sec.style.position = 'relative';

        // 装飾画像を直接 <img> で配置 (背景透過 PNG のまま)
        function makeImg(src, css) {
          var img = document.createElement('img');
          img.src = src;
          img.alt = '';
          img.setAttribute('aria-hidden', 'true');
          img.loading = 'lazy';
          img.decoding = 'async';
          img.style.cssText = css;
          return img;
        }
        // 赤の雲文 (kasumi) — 右上
        sec.appendChild(makeImg(
          'photos/decor/kasumi-red.png',

      function hideAllArcDecor() {
        // 任意の場所にあるアーチ装飾 SVG をすべて非表示にする
        // viewBox や個別のパスでマッチさせる
        var svgs = document.querySelectorAll('svg');
        for (var i = 0; i < svgs.length; i++) {
          var svg = svgs[i];
          if (svg.dataset.arcHidden === '1') continue;
          var vb = svg.getAttribute('viewBox') || '';
          var isFooterArc = vb === '0 0 640 150';
          var isPhilosophyArc = vb === '0 0 420 100';
          if (isFooterArc || isPhilosophyArc) {
            svg.dataset.arcHidden = '1';
            svg.style.display = 'none';
            continue;
          }
          // path の d 属性に "A30 30 0 0 1" のような半円アーチが含まれる SVG も hide
          var paths = svg.querySelectorAll('path');
          for (var j = 0; j < paths.length; j++) {
            var d = paths[j].getAttribute('d') || '';
            if (/A\s*30\s+30\s+0\s+0\s+1/.test(d)) {
              svg.dataset.arcHidden = '1';
              svg.style.display = 'none';
              break;
            }
          }
        }

        <a href=\"#news\" style=\"font-size:13.5px;letter-spacing:.07em;color:var(--hdr);text-decoration:none;\">お知らせ<\u002Fa>\n        <a href=\"#company\" style=\"font-size:13.5px;letter-spacing:.07em;color:var(--hdr);text-decoration:none;\">会社概要<\u002Fa>\n        <a href=\"#contact\" style=\"font-size:13px;letter-spacing:.07em;color:var(--hdr);text-decoration:none;border:1px solid var(--hdrsoft);border-radius:2px;padding:9px 18px;\">お問い合わせ<\u002Fa>\n        <span style=\"display:flex;border:1px solid var(--hdrsoft);border-radius:2px;overflow:hidden;\"><span style=\"font-size:11px;letter-spacing:.1em;color:#1c160f;background:#C9A24B;padding:6px 9px;\">JP<\u002Fspan><span style=\"font-size:11px;letter-spacing:.1em;color:var(--hdr);padding:6px 9px;cursor:pointer;\">EN<\u002Fspan><\u002Fspan>\n      <\u002Fnav>\n      <button onclick=\"{{ toggleMenu }}\" style=\"width:46px;height:46px;border-radius:50%;border:1px solid var(--hdrsoft);background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;flex:none;\">\n        <span style=\"width:18px;height:1.4px;background:var(--hdr);display:block;\"><\u002Fspan>\n        <span style=\"width:18px;height:1.4px;background:var(--hdr);display:block;\"><\u002Fspan>\n        <span style=\"width:18px;height:1.4px;background:var(--hdr);display:block;\"><\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== HERO ===== -->\n  <section id=\"hero\" style=\"position:relative;height:100vh;min-height:620px;overflow:hidden;background:#1c160f;\">\n    <div style=\"position:absolute;inset:0;animation:heroZoom 22s ease-in-out infinite alternate;background:radial-gradient(ellipse 60% 54% at 44% 60%,#7d6038 0%,#5b4630 34%,#382b1c 66%,#1d160e 100%);\"><\u002Fdiv>\n    <div style=\"position:absolute;left:40%;top:60%;width:38%;height:34%;transform:translate(-50%,-50%);background:radial-gradient(ellipse at center,rgba(236,216,168,.38),rgba(236,216,168,0) 70%);\"><\u002Fdiv>\n    <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,15,10,.5) 0%,rgba(20,15,10,0) 24%,rgba(20,15,10,0) 58%,rgba(20,15,10,.52) 100%);\"><\u002Fdiv>\n    <div style=\"position:absolute;inset:0;background:linear-gradient(90deg,rgba(20,15,10,.4) 0%,rgba(20,15,10,0) 42%);\"><\u002Fdiv>\n    <span style=\"position:absolute;left:24px;bottom:18px;font-size:11px;letter-spacing:.16em;color:rgba(246,241,231,.5);\">PHOTO ／ 料理を仕込む職人の手元（自然光）<\u002Fspan>\n    <div style=\"position:absolute;right:clamp(28px,5.5vw,96px);top:50%;transform:translateY(-50%);display:flex;align-items:flex-start;gap:clamp(22px,3vw,48px);animation:fadeUp 1.2s ease .15s both;\">\n      <p style=\"writing-mode:vertical-rl;margin:0;font-family:'Shippori Mincho',serif;font-weight:500;font-size:clamp(13px,1.55vw,17px);line-height:2.3;letter-spacing:.16em;color:rgba(246,241,231,.92);height:clamp(300px,52vh,470px);text-shadow:0 2px 18px rgba(0,0,0,.5);\">奈良の恵みを、職人の技で。<br>大和の食文化を、真心とともに。<br>おもてなしの心でお届けします。<\u002Fp>\n      <h1 style=\"writing-mode:vertical-rl;margin:0;font-family:'Shippori Mincho',serif;font-weight:500;font-size:clamp(56px,8.4vw,104px);line-height:1.24;letter-spacing:.2em;color:#F6F1E7;text-shadow:0 4px 30px rgba(0,0,0,.5);\">奈良の美味<\u002Fh1>\n    <\u002Fdiv>\n    <div style=\"position:absolute;left:50%;bottom:30px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:10px;\">\n      <div style=\"width:1px;height:46px;background:linear-gradient(180deg,rgba(246,241,231,0),rgba(246,241,231,.85));animation:scrollPulse 2.4s ease-in-out infinite;\"><\u002Fdiv>\n      <span style=\"font-size:10px;letter-spacing:.4em;color:rgba(246,241,231,.7);\">SCROLL<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== NEWS ===== -->\n  <section id=\"news\" data-reveal=\"\" style=\"max-width:1200px;margin:0 auto;padding:clamp(64px,8vw,108px) 32px;\">\n    <div style=\"display:flex;gap:clamp(32px,6vw,80px);flex-wrap:wrap;\">\n      <div style=\"flex:none;width:200px;\">\n        <div style=\"font-size:12px;letter-spacing:.42em;color:#8B7E5F;margin-bottom:12px;\">NEWS<\u002Fdiv>\n        <div style=\"font-family:'Shippori Mincho',serif;font-size:28px;letter-spacing:.12em;color:#2E2E2E;\">お知らせ<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1;min-width:300px;\">\n        <a href=\"#news\" style-hover=\"background:#FBF7EE;\" style=\"display:flex;align-items:center;gap:clamp(14px,2vw,28px);padding:22px 8px;border-top:1px solid #E3DAC7;border-bottom:1px solid #E3DAC7;text-decoration:none;color:inherit;flex-wrap:wrap;transition:background .3s ease;\">\n          <span style=\"flex:none;font-size:14px;letter-spacing:.08em;color:#8B7E5F;width:92px;\">2024.05.10<\u002Fspan>\n          <span style=\"flex:none;font-size:11px;letter-spacing:.06em;color:#4D5B41;border:1px solid #B7C0A4;border-radius:2px;padding:4px 12px;\">お知らせ<\u002Fspan>\n          <span style=\"flex:1;min-width:180px;font-size:15px;line-height:1.6;color:#2E2E2E;\">夏季休業に伴う休業日のお知らせ<\u002Fspan>\n          <span style=\"flex:none;font-size:15px;color:#8B7E5F;\">→<\u002Fspan>\n        <\u002Fa>\n        <a href=\"#news\" style-hover=\"background:#FBF7EE;\" style=\"display:flex;align-items:center;gap:clamp(14px,2vw,28px);padding:22px 8px;border-bottom:1px solid #E3DAC7;text-decoration:none;color:inherit;flex-wrap:wrap;transition:background .3s ease;\">\n          <span style=\"flex:none;font-size:14px;letter-spacing:.08em;color:#8B7E5F;width:92px;\">2024.04.25<\u002Fspan>\n          <span style=\"flex:none;font-size:11px;letter-spacing:.06em;color:#8B6F3D;border:1px solid #D8C18C;border-radius:2px;padding:4px 12px;\">新店舗<\u002Fspan>\n          <span style=\"flex:1;min-width:180px;font-size:15px;line-height:1.6;color:#2E2E2E;\">新店舗「奈良の酒蔵全て呑み うまっしゅ」を奈良公園エリアにオープン<\u002Fspan>\n          <span style=\"flex:none;font-size:15px;color:#8B7E5F;\">→<\u002Fspan>\n        <\u002Fa>\n        <a href=\"#news\" style-hover=\"background:#FBF7EE;\" style=\"display:flex;align-items:center;gap:clamp(14px,2vw,28px);padding:22px 8px;border-bottom:1px solid #E3DAC7;text-decoration:none;color:inherit;flex-wrap:wrap;transition:background .3s ease;\">\n          <span style=\"flex:none;font-size:14px;letter-spacing:.08em;color:#8B7E5F;width:92px;\">2024.04.10<\u002Fspan>\n          <span style=\"flex:none;font-size:11px;letter-spacing:.06em;color:#6f6857;border:1px solid #CFC6B2;border-radius:2px;padding:4px 12px;\">メディア<\u002Fspan>\n          <span style=\"flex:1;min-width:180px;font-size:15px;line-height:1.6;color:#2E2E2E;\">大和茶スイーツの季節限定メニューが始まりました<\u002Fspan>\n          <span style=\"flex:none;font-size:15px;color:#8B7E5F;\">→<\u002Fspan>\n        <\u002Fa>\n        <div style=\"display:flex;justify-content:flex-end;margin-top:30px;\">\n          <a href=\"#news\" style-hover=\"background:#4D5B41;color:#F6F1E7;\" style=\"display:inline-flex;align-items:center;gap:12px;background:transparent;color:#4D5B41;font-size:13.5px;letter-spacing:.08em;padding:13px 26px;border:1px solid #8B7E5F;border-radius:2px;text-decoration:none;transition:all .3s ease;\">一覧を見る<span>→<\u002Fspan><\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== 八宝の想い ===== -->\n  <section id=\"omoi\" data-reveal=\"\" style=\"background:#EFE7D5;\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:clamp(72px,9vw,128px) 32px;display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,360px),1fr));gap:clamp(40px,6vw,88px);align-items:center;\">\n      <div>\n        <div style=\"font-size:12px;letter-spacing:.42em;color:#8B7E5F;margin-bottom:22px;\">OUR STORY<\u002Fdiv>\n        <h2 style=\"font-family:'Shippori Mincho',serif;font-weight:500;font-size:clamp(30px,4.2vw,46px);line-height:1.55;letter-spacing:.1em;color:#2E2E2E;margin:0 0 30px;\">奈良の宝を、<br>未来の喜びへ。<\u002Fh2>\n        <p style=\"font-size:15.5px;line-height:2.15;color:#4a463d;margin:0 0 22px;max-width:460px;\">私たち八宝は、奈良で複数の食のブランドを営んでまいりました。受け継がれてきた大和の食文化を礎に、旬の素材と職人の手仕事を大切にしています。<\u002Fp>\n        <p style=\"font-size:15.5px;line-height:2.15;color:#4a463d;margin:0 0 36px;max-width:460px;\">食を通じて、奈良の魅力を未来へ。地域に根ざし、お客様の笑顔とともに歩む——それが私たちの変わらぬ想いです。<\u002Fp>\n        <a href=\"#omoi\" style-hover=\"background:#4D5B41;color:#F6F1E7;\" style=\"display:inline-flex;align-items:center;gap:12px;background:transparent;color:#4D5B41;font-size:14px;letter-spacing:.08em;padding:14px 28px;border:1px solid #8B7E5F;border-radius:2px;text-decoration:none;transition:all .3s ease;\">私たちの想い<span>→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n      <div style=\"position:relative;padding-bottom:56px;padding-left:48px;\">\n        <div style=\"position:relative;height:clamp(330px,40vw,460px);background:linear-gradient(160deg,#e7d3ab 0%,#c49f72 46%,#8a6a45 78%,#5a452e 100%);\">\n          <span style=\"position:absolute;left:18px;bottom:14px;font-size:11px;letter-spacing:.14em;color:rgba(246,241,231,.82);\">PHOTO ／ 奈良の町並み・暖簾<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"position:absolute;left:0;bottom:0;width:46%;height:46%;background:linear-gradient(160deg,#5c6a4d 0%,#3f4a34 70%,#2c3326 100%);border:7px solid #EFE7D5;\">\n          <span style=\"position:absolute;left:14px;bottom:12px;font-size:10.5px;letter-spacing:.14em;color:rgba(246,241,231,.85);\">暖簾<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== BRANDS ===== -->\n  <section id=\"brands\" data-reveal=\"\" style=\"max-width:1240px;margin:0 auto;padding:clamp(72px,9vw,128px) 32px;\">\n    <div style=\"text-align:center;max-width:680px;margin:0 auto clamp(40px,5vw,64px);\">\n      <div style=\"font-size:12px;letter-spacing:.42em;color:#8B7E5F;margin-bottom:16px;\">BRANDS<\u002Fdiv>\n      <h2 style=\"font-family:'Shippori Mincho',serif;font-weight:500;font-size:clamp(28px,3.6vw,40px);letter-spacing:.12em;color:#2E2E2E;margin:0 0 18px;\">ブランド紹介<\u002Fh2>\n      <p style=\"font-size:15px;line-height:1.9;color:#6f6857;margin:0;\">奈良の恵みを生かした、八宝のこだわりの味をご紹介します。<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,240px),1fr));gap:clamp(18px,1.8vw,26px);\">\n\n      <a href=\"#brands\" style-hover=\"transform:translateY(-4px);box-shadow:0 14px 30px rgba(46,46,46,.08);\" style=\"display:flex;flex-direction:column;background:#FBF7EE;border:1px solid #E3DAC7;border-radius:2px;overflow:hidden;text-decoration:none;color:inherit;transition:transform .4s ease,box-shadow .4s ease;\">\n        <div style=\"height:clamp(190px,15vw,222px);background:linear-gradient(155deg,#d2d6b4,#a9b487 62%,#6f7e52);\"><\u002Fdiv>\n        <div style=\"padding:24px 22px 26px;\">\n          <div style=\"font-size:11px;letter-spacing:.24em;color:#A38B4F;margin-bottom:9px;\">GRANCHA<\u002Fdiv>\n          <h3 style=\"font-family:'Shippori Mincho',serif;font-weight:600;font-size:20px;letter-spacing:.08em;color:#2E2E2E;margin:0 0 12px;\">大和茶スイーツ<\u002Fh3>\n          <p style=\"font-size:13.5px;line-height:1.95;color:#6f6857;margin:0 0 18px;\">大和茶の魅力を発信するスイーツブランド。奈良の伝統茶文化を現代に伝える商品づくりをしています。<\u002Fp>\n          <span style=\"display:inline-flex;align-items:center;gap:8px;font-size:13px;letter-spacing:.06em;color:#4D5B41;\">詳細を見る<span>→<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <a href=\"#brands\" style-hover=\"transform:translateY(-4px);box-shadow:0 14px 30px rgba(46,46,46,.08);\" style=\"display:flex;flex-direction:column;background:#FBF7EE;border:1px solid #E3DAC7;border-radius:2px;overflow:hidden;text-decoration:none;color:inherit;transition:transform .4s ease,box-shadow .4s ease;\">\n        <div style=\"height:clamp(190px,15vw,222px);background:linear-gradient(155deg,#3c4434,#2c3326 60%,#1d2419);\"><\u002Fdiv>\n        <div style=\"padding:24px 22px 26px;\">\n          <div style=\"font-size:11px;letter-spacing:.24em;color:#A38B4F;margin-bottom:9px;\">うまっしゅ<\u002Fdiv>\n          <h3 style=\"font-family:'Shippori Mincho',serif;font-weight:600;font-size:20px;letter-spacing:.08em;color:#2E2E2E;margin:0 0 12px;\">奈良の地酒<\u002Fh3>\n          <p style=\"font-size:13.5px;line-height:1.95;color:#6f6857;margin:0 0 18px;\">奈良県全29蔵の日本酒を楽しめる地酒専門店。奈良の酒文化を県内外のお客様へ発信しています。<\u002Fp>\n          <span style=\"display:inline-flex;align-items:center;gap:8px;font-size:13px;letter-spacing:.06em;color:#4D5B41;\">詳細を見る<span>→<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <a href=\"#brands\" style-hover=\"transform:translateY(-4px);box-shadow:0 14px 30px rgba(46,46,46,.08);\" style=\"display:flex;flex-direction:column;background:#FBF7EE;border:1px solid #E3DAC7;border-radius:2px;overflow:hidden;text-decoration:none;color:inherit;transition:transform .4s ease,box-shadow .4s ease;\">\n        <div style=\"height:clamp(190px,15vw,222px);background:linear-gradient(155deg,#efe7d2,#d6bf94 66%,#b29a68);\"><\u002Fdiv>\n        <div style=\"padding:24px 22px 26px;\">\n          <div style=\"font-size:11px;letter-spacing:.24em;color:#A38B4F;margin-bottom:9px;\">むぎの蔵<\u002Fdiv>\n          <h3 style=\"font-family:'Shippori Mincho',serif;font-weight:600;font-size:20px;letter-spacing:.08em;color:#2E2E2E;margin:0 0 12px;\">うどん<\u002Fh3>\n          <p style=\"font-size:13.5px;line-height:1.95;color:#6f6857;margin:0 0 18px;\">国産小麦とこだわりの出汁を使用したうどん専門店。観光客や地元のお客様に愛される味です。<\u002Fp>\n          <span style=\"display:inline-flex;align-items:center;gap:8px;font-size:13px;letter-spacing:.06em;color:#4D5B41;\">詳細を見る<span>→<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n\n      <a href=\"#brands\" style-hover=\"transform:translateY(-4px);box-shadow:0 14px 30px rgba(46,46,46,.08);\" style=\"display:flex;flex-direction:column;background:#FBF7EE;border:1px solid #E3DAC7;border-radius:2px;overflow:hidden;text-decoration:none;color:inherit;transition:transform .4s ease,box-shadow .4s ease;\">\n        <div style=\"height:clamp(190px,15vw,222px);background:linear-gradient(155deg,#cbb083,#9c7b4f 64%,#5f4a30);\"><\u002Fdiv>\n        <div style=\"padding:24px 22px 26px;\">\n          <div style=\"font-size:11px;letter-spacing:.24em;color:#A38B4F;margin-bottom:9px;\">釜めしGRANCHA<\u002Fdiv>\n          <h3 style=\"font-family:'Shippori Mincho',serif;font-weight:600;font-size:20px;letter-spacing:.08em;color:#2E2E2E;margin:0 0 12px;\">釜めし<\u002Fh3>\n          <p style=\"font-size:13.5px;line-height:1.95;color:#6f6857;margin:0 0 18px;\">奈良の食材を活かした釜めしを提供し、日本の食文化を伝えております。<\u002Fp>\n          <span style=\"display:inline-flex;align-items:center;gap:8px;font-size:13px;letter-spacing:.06em;color:#4D5B41;\">詳細を見る<span>→<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fa>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== PHILOSOPHY BAND ===== -->\n  <section style=\"position:relative;min-height:clamp(440px,56vh,560px);display:flex;align-items:center;justify-content:center;overflow:hidden;background:#1c160f;\">\n    <div style=\"position:absolute;inset:0;background:linear-gradient(165deg,#caa46a 0%,#9a7647 30%,#5c4a30 62%,#2c2417 100%);\"><\u002Fdiv>\n    <div style=\"position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,15,10,.32),rgba(20,15,10,.62));\"><\u002Fdiv>\n    <svg width=\"420\" height=\"100\" viewBox=\"0 0 420 100\" style=\"position:absolute;left:50%;bottom:0;transform:translateX(-50%);opacity:.16;\"><g fill=\"none\" stroke=\"#F6F1E7\" stroke-width=\"1\"><path d=\"M0 92 A26 26 0 0 1 52 92\"><\u002Fpath><path d=\"M0 92 A16 16 0 0 1 32 92\"><\u002Fpath><path d=\"M52 92 A26 26 0 0 1 104 92\"><\u002Fpath><path d=\"M52 92 A16 16 0 0 1 84 92\"><\u002Fpath><path d=\"M104 92 A26 26 0 0 1 156 92\"><\u002Fpath><path d=\"M104 92 A16 16 0 0 1 136 92\"><\u002Fpath><path d=\"M156 92 A26 26 0 0 1 208 92\"><\u002Fpath><path d=\"M156 92 A16 16 0 0 1 188 92\"><\u002Fpath><path d=\"M208 92 A26 26 0 0 1 260 92\"><\u002Fpath><path d=\"M208 92 A16 16 0 0 1 240 92\"><\u002Fpath><path d=\"M260 92 A26 26 0 0 1 312 92\"><\u002Fpath><path d=\"M260 92 A16 16 0 0 1 292 92\"><\u002Fpath><path d=\"M312 92 A26 26 0 0 1 364 92\"><\u002Fpath><path d=\"M312 92 A16 16 0 0 1 344 92\"><\u002Fpath><path d=\"M364 92 A26 26 0 0 1 416 92\"><\u002Fpath><path d=\"M364 92 A16 16 0 0 1 396 92\"><\u002Fpath><\u002Fg><\u002Fsvg>\n    <span style=\"position:absolute;right:22px;bottom:16px;font-size:11px;letter-spacing:.14em;color:rgba(246,241,231,.5);\">PHOTO ／ 奈良の夕景・五重塔<\u002Fspan>\n    <div data-reveal=\"\" style=\"position:relative;text-align:center;max-width:720px;padding:0 28px;\">\n      <div style=\"font-size:12px;letter-spacing:.44em;color:rgba(246,241,231,.78);margin-bottom:26px;\">PHILOSOPHY<\u002Fdiv>\n      <h2 style=\"font-family:'Shippori Mincho',serif;font-weight:500;font-size:clamp(28px,4vw,46px);line-height:1.6;letter-spacing:.12em;color:#F6F1E7;margin:0 0 26px;text-shadow:0 2px 20px rgba(0,0,0,.4);\">奈良の食文化を、大切に。<br>人と人とを、笑顔でつなぐ。<\u002Fh2>\n      <p style=\"font-size:15px;line-height:2.1;color:rgba(246,241,231,.92);margin:0 auto 38px;max-width:520px;\">食の安全と安心を追求し、日本の黎明の地・奈良の魅力と精神文化を、食を通じて未来へ。100年先も社会に貢献できる企業を目指して。<\u002Fp>\n      <a href=\"#omoi\" style-hover=\"background:#F6F1E7;color:#2E2E2E;\" style=\"display:inline-flex;align-items:center;gap:12px;background:transparent;color:#F6F1E7;font-size:14px;letter-spacing:.1em;padding:15px 32px;border:1px solid rgba(246,241,231,.7);border-radius:2px;text-decoration:none;transition:all .35s ease;\">企業理念を見る<span>→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== RECRUIT ===== -->\n  <section id=\"recruit\" data-reveal=\"\" style=\"max-width:1240px;margin:0 auto;padding:clamp(72px,9vw,128px) 32px;\">\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,340px),1fr));gap:clamp(40px,5vw,76px);align-items:center;\">\n      <div>\n        <div style=\"font-size:12px;letter-spacing:.42em;color:#8B7E5F;margin-bottom:22px;\">RECRUIT<\u002Fdiv>\n        <h2 style=\"font-family:'Shippori Mincho',serif;font-weight:500;font-size:clamp(26px,3.4vw,38px);line-height:1.6;letter-spacing:.1em;color:#2E2E2E;margin:0 0 26px;\">奈良の魅力を、<br>一緒に届ける仲間を<br>募集しています。<\u002Fh2>\n        <p style=\"font-size:15.5px;line-height:2.1;color:#4a463d;margin:0 0 36px;max-width:440px;\">調理に、接客に、ものづくりに。チームで支え合いながら、奈良の食の魅力をお客様へ届ける——そんな仲間を探しています。人を大切にする会社で、安心して長く働けます。<\u002Fp>\n        <a href=\"#recruit\" style-hover=\"background:#5a6b4d;transform:translateY(-1px);\" style=\"display:inline-flex;align-items:center;gap:13px;background:#4D5B41;color:#F6F1E7;font-size:14.5px;letter-spacing:.08em;padding:17px 34px;border-radius:2px;text-decoration:none;transition:all .3s ease;\">採用情報を見る<span>→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n      <div style=\"position:relative;height:clamp(320px,38vw,440px);background:linear-gradient(160deg,#d8c6a6 0%,#b89a73 48%,#7c6244 82%,#564330 100%);\">\n        <span style=\"position:absolute;left:18px;bottom:14px;font-size:11px;letter-spacing:.14em;color:rgba(246,241,231,.85);\">PHOTO ／ 働くスタッフの自然な笑顔<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,200px),1fr));gap:clamp(16px,2vw,24px);margin-top:clamp(44px,5vw,64px);padding-top:clamp(40px,4vw,52px);border-top:1px solid #E3DAC7;\">\n      <div style=\"display:flex;flex-direction:column;align-items:flex-start;gap:14px;\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 28 28\" fill=\"none\" stroke=\"#8B7E5F\" stroke-width=\"1.5\" stroke-linejoin=\"round\"><path d=\"M14 23 C5 17 2 13 2 9 A5 5 0 0 1 14 7 A5 5 0 0 1 26 9 C26 13 23 17 14 23 Z\"><\u002Fpath><\u002Fsvg>\n        <div style=\"font-family:'Shippori Mincho',serif;font-size:15.5px;letter-spacing:.06em;color:#2E2E2E;\">人を大切にする職場<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:flex-start;gap:14px;\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 28 28\" fill=\"none\" stroke=\"#8B7E5F\" stroke-width=\"1.5\" stroke-linecap=\"round\"><path d=\"M3 25 H25\"><\u002Fpath><path d=\"M7 22 V16\"><\u002Fpath><path d=\"M14 22 V11\"><\u002Fpath><path d=\"M21 22 V6\"><\u002Fpath><\u002Fsvg>\n        <div style=\"font-family:'Shippori Mincho',serif;font-size:15.5px;letter-spacing:.06em;color:#2E2E2E;\">成長できる環境<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:flex-start;gap:14px;\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 28 28\" fill=\"none\" stroke=\"#8B7E5F\" stroke-width=\"1.5\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><circle cx=\"10\" cy=\"9\" r=\"3.4\"><\u002Fcircle><circle cx=\"19\" cy=\"10\" r=\"2.9\"><\u002Fcircle><path d=\"M3.5 24 c0-5 3.5-7 6.5-7 s6.5 2 6.5 7\"><\u002Fpath><path d=\"M17 24 c0-3.6 2.6-5.6 4.8-5.6 s3.7 1.4 3.7 5.6\"><\u002Fpath><\u002Fsvg>\n        <div style=\"font-family:'Shippori Mincho',serif;font-size:15.5px;letter-spacing:.06em;color:#2E2E2E;\">地域に貢献する誇り<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:flex-start;gap:14px;\">\n        <svg width=\"30\" height=\"30\" viewBox=\"0 0 28 28\" fill=\"none\" stroke=\"#8B7E5F\" stroke-width=\"1.5\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><path d=\"M14 3 L24 7 V13 C24 19 19 23 14 25 C9 23 4 19 4 13 V7 Z\"><\u002Fpath><path d=\"M9.5 13.5 l3 3 l6 -6\"><\u002Fpath><\u002Fsvg>\n        <div style=\"font-family:'Shippori Mincho',serif;font-size:15.5px;letter-spacing:.06em;color:#2E2E2E;\">安心の福利厚生<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== COMPANY & CONTACT ===== -->\n  <section id=\"company\" data-reveal=\"\" style=\"background:#EFE7D5;\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:clamp(72px,9vw,120px) 32px;\">\n      <div style=\"text-align:center;max-width:680px;margin:0 auto clamp(40px,5vw,60px);\">\n        <div style=\"font-size:12px;letter-spacing:.42em;color:#8B7E5F;margin-bottom:16px;\">COMPANY &amp; CONTACT<\u002Fdiv>\n        <h2 style=\"font-family:'Shippori Mincho',serif;font-weight:500;font-size:clamp(26px,3.4vw,38px);letter-spacing:.12em;color:#2E2E2E;margin:0;\">会社概要・お問い合わせ<\u002Fh2>\n      <\u002Fdiv>\n      <div id=\"contact\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,260px),1fr));gap:clamp(18px,2vw,28px);\">\n\n        <div style=\"background:#FBF7EE;border:1px solid #E3DAC7;border-radius:2px;padding:38px 32px;display:flex;flex-direction:column;\">\n          <svg width=\"32\" height=\"32\" viewBox=\"0 0 28 28\" fill=\"none\" stroke=\"#8B7E5F\" stroke-width=\"1.5\" stroke-linejoin=\"round\" stroke-linecap=\"round\" style=\"margin-bottom:20px;\"><path d=\"M5 24 V8 L14 3 L23 8 V24\"><\u002Fpath><path d=\"M5 24 H23\"><\u002Fpath><path d=\"M11 24 V17 H17 V24\"><\u002Fpath><path d=\"M10 11 H12 M16 11 H18 M10 14 H12 M16 14 H18\"><\u002Fpath><\u002Fsvg>\n          <h3 style=\"font-family:'Shippori Mincho',serif;font-weight:600;font-size:19px;letter-spacing:.08em;color:#2E2E2E;margin:0 0 12px;\">会社概要<\u002Fh3>\n          <p style=\"font-size:13.5px;line-height:1.95;color:#6f6857;margin:0 0 24px;flex:1;\">会社の沿革や事業所など、八宝の概要をご紹介します。<\u002Fp>\n          <a href=\"#company\" style-hover=\"background:#4D5B41;color:#F6F1E7;\" style=\"display:inline-flex;align-items:center;gap:10px;align-self:flex-start;font-size:13px;letter-spacing:.06em;color:#4D5B41;border:1px solid #8B7E5F;border-radius:2px;padding:11px 22px;text-decoration:none;transition:all .3s ease;\">会社概要を見る<span>→<\u002Fspan><\u002Fa>\n        <\u002Fdiv>\n\n        <div style=\"background:#FBF7EE;border:1px solid #E3DAC7;border-radius:2px;padding:38px 32px;display:flex;flex-direction:column;\">\n          <svg width=\"32\" height=\"32\" viewBox=\"0 0 28 28\" fill=\"none\" stroke=\"#8B7E5F\" stroke-width=\"1.5\" stroke-linejoin=\"round\" stroke-linecap=\"round\" style=\"margin-bottom:20px;\"><path d=\"M14 25 C14 25 23 17.5 23 11 A9 9 0 0 0 5 11 C5 17.5 14 25 14 25 Z\"><\u002Fpath><circle cx=\"14\" cy=\"11\" r=\"3.2\"><\u002Fcircle><\u002Fsvg>\n \">サイトマップ<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:relative;border-top:1px solid rgba(246,241,231,.14);\">\n      <div style=\"max-width:1240px;margin:0 auto;padding:22px 32px;font-size:11.5px;letter-spacing:.1em;color:rgba(246,241,231,.55);\">© 2026 株式会社八宝　HAPPO Co., Ltd.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount(){\n    const header = document.getElementById('happoHeader');\n    this.onScroll = () => {\n      if(!header) return;\n      const s = window.scrollY > 60;\n      if(s){\n        header.style.background = '#F6F1E7';\n        header.style.boxShadow = '0 1px 0 #DCCAA4, 0 10px 30px rgba(46,46,46,.05)';\n        header.style.setProperty('--hdr','#2E2E2E');\n        header.style.setProperty('--hdrsoft','rgba(46,46,46,.5)');\n        header.style.paddingTop = '13px';\n        header.style.paddingBottom = '13px';\n      } else {\n        header.style.background = 'transparent';\n        header.style.boxShadow = 'none';\n        header.style.setProperty('--hdr','#F6F1E7');\n        header.style.setProperty('--hdrsoft','rgba(246,241,231,.72)');\n        header.style.paddingTop = '22px';\n        header.style.paddingBottom = '22px';\n      }\n    };\n    window.addEventListener('scroll', this.onScroll, {passive:true});\n    this.onScroll();\n    const obs = new IntersectionObserver((ents)=>{\n      ents.forEach(e=>{ if(e.isIntersecting){ e.target.style.opacity='1'; e.target.style.transform='none'; obs.unobserve(e.target); } });\n    }, {threshold:0.1, rootMargin:'0px 0px -6% 0px'});\n    requestAnimationFrame(()=>{\n      document.querySelectorAll('[data-reveal]').forEach(el=>{\n        el.style.opacity='0';\n        el.style.transform='translateY(26px)';\n        el.style.transition='opacity .9s cubic-bezier(.22,.61,.36,1), transform .9s cubic-bezier(.22,.61,.36,1)';\n        obs.observe(el);\n      });\n    });\n  }\n  componentWillUnmount(){ if(this.onScroll) window.removeEventListener('scroll', this.onScroll); }\n  renderVals(){\n    return {\n      toggleMenu: () => {\n        const o = document.getElementById('happoMenu'); if(!o) return;\n        const open = o.getAttribute('data-open') === '1';\n        o.setAttribute('data-open', open ? '0' : '1');\n        o.style.opacity = open ? '0' : '1';\n        o.style.visibility = open ? 'hidden' : 'visible';\n        o.style.pointerEvents = open ? 'none' : 'auto';\n        document.body.style.overflow = open ? '' : 'hidden';\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
